kind: assertion
apiVersion: api.ibm.com/v1
metadata:
  name: 200-success
  namespace: singapore-air-temperature
  version: '1.0'
  tags:
    - assertion
spec:
  - name: Validate response status code
    key: responseStatus
    value: 200
    action: equals
    stopOnFail: false
  - name: Validate content type is JSON
    key: responseHeaders.content-type
    value: application/json
    action: include
    stopOnFail: false
