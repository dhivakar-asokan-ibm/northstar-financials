kind: test
apiVersion: api.ibm.com/v1
metadata:
  name: singapore-air-temperature-test
  namespace: singapore-air-temperature
  version: '1.0'
  tags:
    - environment
    - weather
spec:
  api:
    $endpoint: 'https://singapore-air-temperature-product-sandbox-dev.nanogw.studio.joker.dev.ciondemand.com/1/environment'
  environment:
    $ref: 'singapore-air-temperature:singapore-air-temperature-environment:1.0'
  request:
    # Test 1: Happy path — GET /air-temperature with no filters
    - method: GET
      resource: /air-temperature
      headers:
        - key: accept
          value: application/json
        - key: X-IBM-Client-Id
          value: ${client_id}
        - key: X-IBM-Client-Secret
          value: ${client_secret}
      assertions:
        - $ref: 'singapore-air-temperature:200-air-temperature-response:1.0'

    # Test 2: Filter by station_id
    - method: GET
      resource: /air-temperature
      headers:
        - key: accept
          value: application/json
        - key: X-IBM-Client-Id
          value: ${client_id}
        - key: X-IBM-Client-Secret
          value: ${client_secret}
      parameters:
        - key: station_id
          value: S101
          type: query
      assertions:
        - $ref: 'singapore-air-temperature:200-air-temperature-response:1.0'

    # Test 3: Filter by time range
    - method: GET
      resource: /air-temperature
      headers:
        - key: accept
          value: application/json
        - key: X-IBM-Client-Id
          value: ${client_id}
        - key: X-IBM-Client-Secret
          value: ${client_secret}
      parameters:
        - key: start_time
          value: '2025-11-11T00:00:00+08:00'
          type: query
        - key: end_time
          value: '2025-11-11T12:00:00+08:00'
          type: query
      assertions:
        - $ref: 'singapore-air-temperature:200-air-temperature-response:1.0'

    # Test 4: Missing credentials — expect 401
    - method: GET
      resource: /air-temperature
      headers:
        - key: accept
          value: application/json
      auth:
        noauth: true
      assertions:
        - $ref: 'singapore-air-temperature:401-unauthorized:1.0'
