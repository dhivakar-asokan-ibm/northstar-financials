kind: environment
apiVersion: api.ibm.com/v1
metadata:
  name: singapore-air-temperature-environment
  namespace: BYOCA-demo
  version: '1.0'
  tags:
    - environment
    - singapore
spec:
  variables:
    - key: client_id
      isSecret: true
      value: $(client_id)
    - key: client_secret
      isSecret: true
      value: $(client_secret)
