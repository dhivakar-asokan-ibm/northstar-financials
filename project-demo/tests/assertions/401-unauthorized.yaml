kind: assertion
apiVersion: api.ibm.com/v1
metadata:
  name: 401-unauthorized
  namespace: project-demo
  version: '1'
  tags:
    - assertion
spec:
  - name: Validate response status code is 401
    key: responseStatus
    value: 401
    action: equals
    stopOnFail: true
  - name: Validate content type is JSON
    key: responseHeaders.content-type
    value: application/json
    action: include
    stopOnFail: false
