kind: assertion
apiVersion: api.ibm.com/v1
metadata:
  name: 400-bad-request
  namespace: project-demo
  version: '1'
  tags:
    - assertion
spec:
  - name: Validate response status code is 400
    key: responseStatus
    value: 400
    action: equals
    stopOnFail: true
  - name: Validate content type is JSON
    key: responseHeaders.content-type
    value: application/json
    action: include
    stopOnFail: false
