kind: assertion
apiVersion: api.ibm.com/v1
metadata:
  name: 200-air-temperature-response
  namespace: air-temperature-demo
  version: '1.0'
  tags:
    - assertion
spec:
  - name: Validate response status code
    key: responseStatus
    value: 200
    action: equals
    stopOnFail: false
  - name: Validate content type is JSON
    key: responseHeaders.content-type
    value: application/json
    action: include
    stopOnFail: false
  - name: Validate response body has items array
    key: responseBody
    value: items
    action: haveProperty
    stopOnFail: false
  - name: Validate response body has api_info
    key: responseBody
    value: api_info
    action: haveProperty
    stopOnFail: false
  - name: Validate api_info has status
    key: responseBody.api_info
    value: status
    action: haveProperty
    stopOnFail: false
