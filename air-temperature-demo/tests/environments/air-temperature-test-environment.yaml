kind: environment
apiVersion: api.ibm.com/v1
metadata:
  name: air-temperature-test-environment
  namespace: air-temperature-demo
  version: '1.0'
  tags:
    - environment
    - weather
spec:
  variables:
    - key: client_id
      isSecret: true
      value: $(client_id)
    - key: client_secret
      isSecret: true
      value: $(client_secret)
