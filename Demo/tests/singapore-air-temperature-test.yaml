kind: test
apiVersion: api.ibm.com/v1
metadata:
  name: singapore-air-temperature-test
  namespace: demo
  version: "1.0"
  tags:
    - test
spec:
  api:
    $endpoint: https://sample-api.eu-west-a.apiconnect.automation.ibm.com/environment
  environment:
    $ref: demo:singapore-air-temperature-environment:1.0
  request:
    - method: GET
      resource: /air-temperature
      headers:
        - key: accept
          value: application/json
      parameters: []
      assertions:
        - $ref: demo:200-air-temperature-response:1.0

    - method: GET
      resource: /air-temperature
      headers:
        - key: accept
          value: application/json
      parameters:
        - key: station_id
          value: S101
          type: query
      assertions:
        - $ref: demo:200-air-temperature-response:1.0

    - method: GET
      resource: /air-temperature
      headers:
        - key: accept
          value: application/json
      parameters:
        - key: start_time
          value: "2025-11-11T00:00:00+08:00"
          type: query
        - key: end_time
          value: "2025-11-11T12:00:00+08:00"
          type: query
      assertions:
        - $ref: demo:200-air-temperature-response:1.0

