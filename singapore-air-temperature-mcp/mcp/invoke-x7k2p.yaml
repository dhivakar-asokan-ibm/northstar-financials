kind: Invoke
apiVersion: api.ibm.com/v1
metadata:
  name: invoke-x7k2p
  namespace: singapore-air-temperature-mcp
  version: '1'
  tags: []
  labels:
    gatewayTypes:
      - nano
spec:
  endpoint:
    http:
      target:
        url: '''https://sample-api.eu-west-a.apiconnect.automation.ibm.com/environment'' & $pathAndQuery()'
        urlType: jsonata
        version: HTTP/1.1
        timeout: 30
        persistentConnections: false
        tlsClientProfile: tls-client-profile-default:1.0.0
        decompressResponse: true
        followRedirects: false
        chunkedUpload: false
